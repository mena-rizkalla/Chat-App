name: Android CI/CD on Develop Branch

on:
  push:
    branches: [ develop ]

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for release notes

      - name: Create local.properties
        run: echo "GEMINI_API_KEY=\"${{ secrets.GEMINI_API_KEY }}\"" > local.properties

      # 2. Set up the Java environment (JDK)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 3. Cache Gradle packages to speed up future builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Decode and place the google-services.json file
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo $GOOGLE_SERVICES_JSON_BASE64 | base64 --decode > ${{ github.workspace }}/app/google-services.json

      # 5. Grant execute permission for the gradlew file
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Run Lint Check
      - name: Run Lint Check
        run: ./gradlew lintDebug

      # 7. Run Unit Tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 8. Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # 9. Generate Release Notes
      - name: Draft Release Notes
        if: github.actions == true
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. Upload the APK to Firebase App Distribution
      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          file: app/build/outputs/apk/debug/app-debug.apk
          groups: qa-team
          releaseNotes: ${{ steps.release_notes.outputs.release-notes }}